version: '3.8'

services:
  # ============================================================================
  # Frontend Service - React + Vite SPA
  # ============================================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: chrono-walk-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://api:8000
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - chrono-walk
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

  # ============================================================================
  # Backend API Service - FastAPI
  # ============================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: chrono-walk-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/chrono_walk
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      LOG_LEVEL: INFO
      PYTHONUNBUFFERED: 1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chrono-walk
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`localhost`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  # ============================================================================
  # PostgreSQL Database - Data Persistence
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: chrono-walk-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chrono_walk
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    networks:
      - chrono-walk
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Redis Cache - Session & Query Caching
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: chrono-walk-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - chrono-walk
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Prometheus - Metrics Collection
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: chrono-walk-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - chrono-walk
    restart: unless-stopped
    depends_on:
      - api

  # ============================================================================
  # Grafana - Visualization & Dashboards
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: chrono-walk-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - chrono-walk
    restart: unless-stopped
    depends_on:
      - prometheus

  # ============================================================================
  # Reverse Proxy - Traefik
  # ============================================================================
  traefik:
    image: traefik:latest
    container_name: chrono-walk-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - chrono-walk
    restart: unless-stopped

  # ============================================================================
  # PgAdmin - Database Management UI (Optional)
  # ============================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: chrono-walk-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - chrono-walk
    restart: unless-stopped
    depends_on:
      - postgres

  # ============================================================================
  # Redis Commander - Redis Management UI (Optional)
  # ============================================================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: chrono-walk-redis-commander
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    networks:
      - chrono-walk
    restart: unless-stopped
    depends_on:
      - redis

# ============================================================================
# Networks
# ============================================================================
networks:
  chrono-walk:
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  pgadmin_data:
    driver: local

# ============================================================================
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose down                # Stop all services
#   docker-compose logs -f api         # View logs
#   docker-compose ps                  # List services
#
# Services:
#   Frontend:        http://localhost:3000
#   API:             http://localhost:8000
#   API Docs:        http://localhost:8000/docs
#   Prometheus:      http://localhost:9090
#   Grafana:         http://localhost:3001 (admin/admin)
#   Traefik:         http://localhost:8080
#   PgAdmin:         http://localhost:5050
#   Redis CLI:       http://localhost:8081
# ============================================================================
